<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Body & Butter | Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/responsive.css">

</head>

<body class="inner-page">

<header>

<nav class="navbar">

    <div class="logo">
        <a href="index.html">
            <img src="images/logo/logo.png" alt="Body & Butter">
        </a>
    </div>
<div class="menu-toggle" onclick="toggleMenu()">
    <i class="bi bi-list"></i>
</div>
     <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="ingredients.html">Ingredients</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="contact.html">Contact</a></li>
</ul>

    <div class="nav-icons">

        <button class="icon-btn" onclick="toggleSearch()">
            <i class="bi bi-search"></i>
        </button>

        <a href="wishlist.html" class="icon-btn">
            <i class="bi bi-heart"></i>
        </a>

        <a href="cart.html" class="icon-btn cart-icon">
            <i class="bi bi-bag"></i>
            <span id="cartCount" class="cart-count">0</span>
        </a>

    </div>

</nav>

</header>

<div id="searchBox" class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
        onkeyup="searchProducts()">

    <div id="searchResults"></div>

</div>

<section class="cart-hero">

<div class="container">

<h5>Checkout</h5>

<h1>Complete Your Order</h1>

<p>

Fill in your billing details to complete your purchase.

</p>

</div>

</section>

<section class="checkout-section">

<div class="container">

<div class="checkout-wrapper">

<div class="checkout-form">

<h2>Billing Details</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<textarea placeholder="Shipping Address" required></textarea>

<select>

<option>Cash On Delivery</option>

<option>UPI</option>

<option>Credit / Debit Card</option>

</select>

<button

type="button"

class="btn"

onclick="placeOrder()">

Place Order

</button>

</form>

</div>

<div class="checkout-summary">

<h2>Order Summary</h2>

<div id="checkoutProducts"></div>

<hr>

<h3 style="display:flex;justify-content:space-between;">

<span>Total</span>

<span id="checkoutTotal">₹0</span>

</h3>

</div>

</div>

</div>

</section>

<script src="js/script.js"></script>

</body>

</html>
